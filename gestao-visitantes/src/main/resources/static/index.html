<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AD Gestão - Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar { background-color: #1a3a5a; }
        .hero-section { background: #1a3a5a; color: white; padding: 40px 0; text-align: center; }
        .card-aviso { border-left: 5px solid #1a3a5a; margin-bottom: 15px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark shadow" style="background-color: #1a3a5a; min-height: 80px;">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand p-0 m-0 d-flex align-items-center" href="/" style="text-decoration: none;">
            <div style="width: 50px; height: 50px; border-radius: 50%; border: 2px solid white;
                        background-color: #ffffff; display: flex; align-items: center;
                        justify-content: center; font-size: 28px; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
                ⛪
            </div>
            <span class="ms-3 fw-bold" style="font-size: 1.2rem;">
                Assembleia de Deus - Área 7
            </span>
        </a>

        <a href="/login.html" class="btn btn-outline-light btn-sm fw-bold">Área do ADM</a>
    </div>
</nav>

<header class="hero-section">
    <h1>Mural de Avisos</h1>
    <p>Fique por dentro das atividades da nossa igreja</p>
</header>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <h3>Informativos Recentes</h3>
            <hr>
            <div id="lista-avisos">
                <p class="text-muted">Carregando avisos...</p>
            </div>
        </div>
    </div>
</div>

<script>

    fetch('/api/informativos')
        .then(response => response.json())
        .then(dados => {
            const div = document.getElementById('lista-avisos');
            div.innerHTML = '';

            if(dados.length === 0) {
                div.innerHTML = '<p>Nenhum aviso no momento.</p>';
                return;
            }

            dados.forEach(aviso => {
                div.innerHTML += `
                    <div class="card card-aviso shadow-sm p-3">
                        <h5>${aviso.titulo}</h5>
                        <p>${aviso.mensagem}</p>
                        <small class="text-muted">Postado em: ${new Date(aviso.dataPublicacao).toLocaleDateString()}</small>
                    </div>
                `;
            });
        })
        .catch(err => {
            document.getElementById('lista-avisos').innerHTML = 'Erro ao carregar avisos.';
        });
</script>

</body>
</html>
