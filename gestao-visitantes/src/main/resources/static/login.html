<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - AD Gestão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a3a5a; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { border-radius: 15px; width: 350px; }
        .btn-primary { background-color: #1a3a5a; border: none; }
    </style>
</head>
<body>
<div class="card shadow p-4">
    <h3 class="text-center mb-4">Acesso ADM</h3>

    <div id="error" class="alert alert-danger d-none">Usuário ou senha inválidos!</div>

    <form action="/login" method="post">
        <div class="mb-3">
            <label class="form-label">Usuário</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Senha</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>
</div>

<script>
    if (window.location.search.includes('error')) {
        document.getElementById('error').classList.remove('d-none');
    }
</script>
</body>
</html>
