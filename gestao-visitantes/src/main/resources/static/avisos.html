<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AD Gestão - Gerenciar Avisos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar { background-color: #1a3a5a; }
        body { background-color: #f4f7f6; }
        .card { border: none; border-radius: 12px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark shadow mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand fw-bold" href="/visitantes.html">← Voltar para Visitantes</a>
        <a href="/logout" class="btn btn-danger btn-sm">Sair do Sistema</a>
    </div>
</nav>

<div class="container">
    <div class="card shadow-sm p-4 mb-4">
        <h4>Publicar Novo Aviso no Mural</h4>
        <p class="text-muted">O que você escrever aqui aparecerá nos cards da página inicial.</p>
        <form id="formAviso">
            <div class="mb-3">
                <label class="form-label fw-bold">Título do Aviso</label>
                <input type="text" id="titulo" class="form-control" placeholder="Ex: Culto de Jovens" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">Mensagem</label>
                <textarea id="mensagem" class="form-control" rows="3" placeholder="Data, horário e detalhes..." required></textarea>
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold">PUBLICAR NO MURAL</button>
        </form>
    </div>

    <div class="card shadow-sm p-4">
        <h4>Avisos Ativos</h4>
        <div id="lista-avisos-adm" class="list-group mt-3"></div>
    </div>
</div>

<script>
    document.getElementById('formAviso').addEventListener('submit', function(e) {
        e.preventDefault();
        fetch('/api/informativos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                titulo: document.getElementById('titulo').value,
                mensagem: document.getElementById('mensagem').value
            })
        }).then(() => { alert("Aviso publicado!"); location.reload(); });
    });

    fetch('/api/informativos').then(res => res.json()).then(data => {
        const lista = document.getElementById('lista-avisos-adm');
        data.forEach(a => {
            lista.innerHTML += `
                <div class="list-group-item d-flex justify-content-between align-items-center">
                    <div><strong>${a.titulo}</strong><br><small>${a.mensagem}</small></div>
                    <button class="btn btn-danger btn-sm" onclick="deletarAviso(${a.id})">Excluir</button>
                </div>`;
        });
    });

    function deletarAviso(id) {
        if(confirm("Deseja apagar este aviso?")) {
            fetch(`/api/informativos/${id}`, { method: 'DELETE' }).then(() => location.reload());
        }
    }
</script>
</body>
</html>
